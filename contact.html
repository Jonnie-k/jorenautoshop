<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>JOREN AUTO SHOP | Contact</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
    <style>
        * {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}

body {
  background: #f5f5f5;
}

nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: #111;
  padding: 15px 40px;
}

.logo {
  color: #fff;
}

.nav-links {
  display: flex;
  list-style: none;
}

.nav-links li {
  margin-left: 20px;
}

.nav-links a {
  color: #fff;
  text-decoration: none;
  padding: 8px 12px;
}

.nav-links a:hover,
.active {
  background: #ff6600;
  border-radius: 5px;
}

.hero {
  height: 90vh;
  background: url('https://images.unsplash.com/photo-1503376780353-7e6692767b70') center/cover;
  display: flex;
  align-items: center;
  justify-content: center;
}

.hero-text {
  color: white;
  text-align: center;
}

.btn {
  display: inline-block;
  margin-top: 15px;
  padding: 10px 20px;
  background: #ff6600;
  color: white;
  text-decoration: none;
}

.about {
  padding: 50px;
  text-align: center;
}

.services {
  padding: 50px;
  text-align: center;
}

.service-container {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 20px;
  margin-top: 20px;
}

.card {
  background: white;
  padding: 20px;
  border-radius: 10px;
  box-shadow: 0 5px 10px rgba(0,0,0,0.1);
}

.contact {
  padding: 50px;
  text-align: center;
}

form {
  max-width: 400px;
  margin: auto;
  display: flex;
  flex-direction: column;
}

form input, form textarea {
  margin: 10px 0;
  padding: 10px;
}

button {
  background: #ff6600;
  color: white;
  border: none;
  padding: 10px;
}

footer {
  text-align: center;
  padding: 20px;
  background: #111;
  color: white;
  margin-top: 30px;
}
    </style>

<nav>
  <h2 class="logo">JOREN AUTOs</h2>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="services.html">Services</a></li>
    <li><a href="contact.html" class="active">Contact</a></li>
  </ul>
</nav>

<section class="contact">
  <h1>Contact Us</h1>

  <form>
    <input type="text" placeholder="Your Name" required>
    <input type="email" placeholder="Your Email" required>
    <textarea placeholder="Your Message"></textarea>
    <button type="submit">Send Message</button>
  </form>

  <div class="contact-info">
    <p>Email: info@autofix.com</p>
    <p>Phone: +254 700 000000</p>
    <p>Location: Nairobi, Kenya</p>
  </div>
</section>

<footer>
  <p>© 2026 JOREN AUTOs. All rights reserved.</p>

</footer>

</body>
</html>
